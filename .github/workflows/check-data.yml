name: Check Testcases

on:
  pull_request:
    paths:
      - 'problems/**'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Run checks
        run: |
          set -e
          EXEC_TIMEOUT="2s"

          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags --prune --depth=1 origin "$BASE_REF"

          mapfile -t CHANGED_FILES < <(git diff --name-only "origin/$BASE_REF...HEAD" -- 'problems/**')

          declare -A SEEN_DIRS
          declare -A DIR_RUN_ALL_INS
          declare -A DIR_RUN_ALL_ANS
          declare -A DIR_CHANGED_INS_STEMS
          declare -A DIR_CHANGED_ANS_STEMS
          TARGET_DIRS=()

          for file in "${CHANGED_FILES[@]}"; do
            dir=$(dirname "$file")
            while [ "$dir" != "." ] && [ "$dir" != "problems" ]; do
              if [ -f "$dir/validator.cpp" ]; then
                if [ -z "${SEEN_DIRS[$dir]+x}" ]; then
                  SEEN_DIRS[$dir]=1
                  TARGET_DIRS+=("$dir")
                fi

                case "$file" in
                  "$dir/validator.cpp")
                    DIR_RUN_ALL_INS[$dir]=1
                    ;;
                  "$dir/std.cpp")
                    DIR_RUN_ALL_ANS[$dir]=1
                    ;;
                  *.in)
                    stem="${file%.in}"
                    DIR_CHANGED_INS_STEMS["$stem"]=1
                    ;;
                  *.ans)
                    stem="${file%.ans}"
                    DIR_CHANGED_ANS_STEMS["$stem"]=1
                    ;;
                esac

                break
              fi
              dir=$(dirname "$dir")
            done
          done

          if [ ${#TARGET_DIRS[@]} -eq 0 ]; then
            echo "No changed problem directories to check."
            exit 0
          fi

          for dir in "${TARGET_DIRS[@]}"; do
            if [ -f "$dir/validator.cpp" ]; then
              echo "Checking $dir"

              g++ -std=c++20 -Iinclude "$dir/validator.cpp" -o validator

              if [ -f "$dir/checker.cpp" ]; then
                g++ -std=c++20 -Iinclude "$dir/checker.cpp" -o checker
              fi

              if [ -f "$dir/std.cpp" ]; then
                g++ -std=c++20 -Iinclude "$dir/std.cpp" -o std
              else
                echo "Missing std.cpp in $dir"
                exit 1
              fi

              declare -A SELECTED_STEMS
              declare -A STEM_RUN_VALIDATOR
              declare -A STEM_RUN_STD

              if [ -n "${DIR_RUN_ALL_INS[$dir]+x}" ]; then
                while IFS= read -r infile; do
                  [ -n "$infile" ] || continue
                  stem="${infile%.in}"
                  SELECTED_STEMS["$stem"]=1
                  STEM_RUN_VALIDATOR["$stem"]=1
                done < <(find "$dir" -type f -name '*.in' | sort)
              fi

              if [ -n "${DIR_RUN_ALL_ANS[$dir]+x}" ]; then
                while IFS= read -r ansfile; do
                  [ -n "$ansfile" ] || continue
                  stem="${ansfile%.ans}"
                  SELECTED_STEMS["$stem"]=1
                  STEM_RUN_STD["$stem"]=1
                done < <(find "$dir" -type f -name '*.ans' | sort)
              fi

              for stem in "${!DIR_CHANGED_INS_STEMS[@]}"; do
                case "$stem" in
                  "$dir"/*)
                    SELECTED_STEMS["$stem"]=1
                    STEM_RUN_VALIDATOR["$stem"]=1
                    STEM_RUN_STD["$stem"]=1
                    ;;
                esac
              done

              for stem in "${!DIR_CHANGED_ANS_STEMS[@]}"; do
                case "$stem" in
                  "$dir"/*)
                    SELECTED_STEMS["$stem"]=1
                    STEM_RUN_STD["$stem"]=1
                    ;;
                esac
              done

              if [ ${#SELECTED_STEMS[@]} -eq 0 ]; then
                echo "  No testcase files to check."
                continue
              fi

              mapfile -t SORTED_STEMS < <(printf '%s\n' "${!SELECTED_STEMS[@]}" | sort)

              for stem in "${SORTED_STEMS[@]}"; do
                infile="$stem.in"
                ansfile="$stem.ans"

                base=${stem#$dir/}
                echo "  Test $base"

                if [ -n "${STEM_RUN_VALIDATOR[$stem]+x}" ]; then
                  if [ ! -f "$infile" ]; then
                    echo "Missing $infile"
                    exit 1
                  fi

                  timeout "$EXEC_TIMEOUT" ./validator < "$infile"

                fi

                if [ -n "${STEM_RUN_STD[$stem]+x}" ]; then
                  if [ ! -f "$infile" ]; then
                    echo "Missing $infile"
                    exit 1
                  fi

                  if [ ! -f "$ansfile" ]; then
                    echo "Missing $ansfile"
                    exit 1
                  fi

                  timeout "$EXEC_TIMEOUT" ./std < "$infile" > out.txt

                  if [ -f "$dir/checker.cpp" ]; then
                    timeout "$EXEC_TIMEOUT" ./checker "$infile" out.txt "$ansfile"
                  else
                    diff -q out.txt "$ansfile"
                  fi
                fi
              done
            fi
          done