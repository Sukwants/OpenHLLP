name: Check Testcases

on:
  pull_request:
    paths:
      - 'problems/**'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Run checks
        run: |
          set -e
          EXEC_TIMEOUT="2s"

          for dir in $(find problems -type d); do
            if [ -f "$dir/validator.cpp" ]; then
              echo "Checking $dir"

              g++ -std=c++17 -Iinclude "$dir/validator.cpp" -o validator

              if [ -f "$dir/checker.cpp" ]; then
                g++ -std=c++17 -Iinclude "$dir/checker.cpp" -o checker
              fi

              if [ -f "$dir/std.cpp" ]; then
                g++ -std=c++17 -Iinclude "$dir/std.cpp" -o std
              else
                echo "Missing std.cpp in $dir"
                exit 1
              fi

              for infile in "$dir"/*.in; do
                [ -e "$infile" ] || continue

                base=$(basename "$infile" .in)
                ansfile="$dir/$base.ans"

                if [ ! -f "$ansfile" ]; then
                  echo "Missing $ansfile"
                  exit 1
                fi

                echo "  Test $base"

                # validator
                timeout "$EXEC_TIMEOUT" ./validator < "$infile"

                # generate output
                timeout "$EXEC_TIMEOUT" ./std < "$infile" > out.txt

                # checker or diff
                if [ -f "$dir/checker.cpp" ]; then
                  timeout "$EXEC_TIMEOUT" ./checker "$infile" out.txt "$ansfile"
                else
                  diff -q out.txt "$ansfile"
                fi
              done
            fi
          done